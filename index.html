<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>TechWave</title>
</head>
<body>
    <header class="site-header">
        <nav class="navbar">
            <a href="#" class="logo">Tech<span>Wave</span></a>

            <ul class="nav-links">
                <li><a href="#">About</a></li>
                <li><a href="#">Episodes</a></li>
                <li><a href="#">Host</a></li>
            </ul>

            <a href="#" class="subscribe-btn">Subscribe</a>
            <button class="menu-btn" aria-label="Open menu">
                <img src="assets/hamburger-menu.png" alt="">
            </button>
        </nav>
    </header>

    <main>
        <section class="hero">
            <div class="hero-content">
                <div class="podcast-orb" aria-hidden="true">
                    <span class="new-badge">NEW</span>
                    <img class="orb-bg" src="assets/hero-circle.png" alt="">
                    <img class="mic" src="assets/microphone.png" alt="">
                </div>

                <h1>TechWave</h1>
                <p>Your daily dose of tech insights, productivity hacks, and personal growth.</p>

                <div class="hero-actions">
                    <a href="#" class="primary-action">Listen on Spotify</a>
                    <a href="#" class="secondary-action">Subscribe</a>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
